<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Veexion — Acceso Seguro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #06090d;
      --surface:  #0c1118;
      --border:   #1a2535;
      --accent:   #00d4ff;
      --accent2:  #00ff94;
      --danger:   #ff3d3d;
      --text:     #c8dde8;
      --muted:    #3a5468;
      --mono:     'Share Tech Mono', monospace;
      --sans:     'Barlow', sans-serif;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: var(--sans);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow center */
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,212,255,0.04) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .login-wrap {
      width: 420px;
      position: relative;
      z-index: 10;
      animation: fadeUp .6s ease both;
    }

    /* Header branding */
   .brand {
  position: relative;
  text-align: center;
  margin-bottom: 32px;
  z-index: 1; /* menor que los hijos para que ::before quede detrás */
}

.brand::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  width: 100%;
  height: 120px;
  transform: translateX(-60%);
  background: url('ssip2.png') no-repeat center top;
  background-size: cover;
  opacity: 0.23; /* un poco más visible */
  pointer-events: none;
  border-radius: 0 0 100% 100%;
  z-index: 0; /* aseguramos que esté detrás de los hijos */
}
    .brand-shield {
      width: 56px; height: 56px;
      margin: 0 auto 16px;
      color: var(--accent);
      filter: drop-shadow(0 0 16px rgba(0,212,255,0.5));
      animation: shieldPulse 3s ease infinite;
    }


.brand-link { display: block; text-align: center; color: inherit; }
.brand-link:hover { text-decoration: none; }
  

.brand { position: relative; z-index: 5; }

    .brand-name {
      font-family: var(--mono);
      font-size: 28px;
      letter-spacing: 8px;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0,212,255,0.4);
      display: block;
    }

    .brand-tagline {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
      display: block;
    }

    /* Card */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 32px;
      box-shadow:
        0 0 0 1px rgba(0,212,255,0.05),
        0 20px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.03);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Form */
    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      outline: none;
      transition: all .2s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
    }
    .field input::placeholder { color: var(--muted); opacity: 0.5; }

    /* Submit */
    .btn-login {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,255,148,0.08));
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--accent);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .25s;
      position: relative;
      overflow: hidden;
    }
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity .25s;
    }
    .btn-login:hover::before { opacity: 0.15; }
    .btn-login:hover {
      box-shadow: 0 0 20px rgba(0,212,255,0.25);
      transform: translateY(-1px);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login span { position: relative; z-index: 1; }

    /* Loading state */
    .btn-login.loading {
      pointer-events: none;
      opacity: 0.7;
    }
    .btn-login.loading span::after {
      content: ' ···';
      animation: dots 1s infinite;
    }

    /* Error */
    .error-msg {
      margin-top: 16px;
      padding: 10px 14px;
      background: rgba(255,61,61,0.1);
      border: 1px solid rgba(255,61,61,0.3);
      border-radius: 6px;
      color: var(--danger);
      font-size: 12px;
      font-family: var(--mono);
      display: none;
    }
    .error-msg.show { display: block; animation: fadeUp .3s ease; }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      opacity: 0.5;
    }

    /* Scan line animation */
    .scanline {
      position: fixed;
      top: -100%;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.15), transparent);
      animation: scan 8s linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shieldPulse {
      0%, 100% { filter: drop-shadow(0 0 16px rgba(0,212,255,0.5)); }
      50%       { filter: drop-shadow(0 0 28px rgba(0,212,255,0.8)); }
    }
    @keyframes scan {
      from { top: -2px; }
      to   { top: 100vh; }
    }
    @keyframes dots {
      0%   { content: ' ·'; }
      33%  { content: ' ··'; }
      66%  { content: ' ···'; }
    }
  </style>
</head>
<body>
  <div class="scanline"></div>

  <div class="login-wrap">

    <div class="brand">
    <a href="index.html" class="brand-link" style="text-decoration:none;">
      <div class="brand-shield">
        <svg viewBox="0 0 56 56" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M28 4L6 14v16c0 12 9.8 22.4 22 26 12.2-3.6 22-14 22-26V14L28 4z"/>
          <circle cx="28" cy="26" r="7"/>
          <path d="M21 40c1.8-3.4 4-5 7-5s5.2 1.6 7 5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="brand-name">Veexion</span>
      <span class="brand-tagline">Supervisión Inteligente Preventiva</span>
    </a>
  </div>
    <div class="login-card">
      <div class="card-title">Acceso al sistema</div>

      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="empresa@correo.com" autocomplete="email"/>
      </div>

      <div class="field">
        <label>Contraseña</label>
        <div style="position:relative;">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
            style="width:100%;padding:12px 42px 12px 14px;background:rgba(0,0,0,0.3);
            border:1px solid var(--border);border-radius:6px;color:var(--text);
            font-family:var(--mono);font-size:14px;outline:none;transition:all .2s;box-sizing:border-box;"/>
          <button type="button" id="togglePass" tabindex="-1"
            style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
            background:none;border:none;cursor:pointer;color:var(--muted);
            padding:0;display:flex;align-items:center;transition:color .2s;"
            title="Mostrar/ocultar contraseña">
            <svg id="eyeIcon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
              <path d="M1 10s3-6 9-6 9 6 9 6-3 6-9 6-9-6-9-6z"/>
              <circle cx="10" cy="10" r="2.5"/>
            </svg>
          </button>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
        <input type="checkbox" id="rememberMe" style="
          width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;"/>
        <label for="rememberMe" style="
          font-size:12px;color:var(--muted);cursor:pointer;user-select:none;
          letter-spacing:.5px;">Recordar sesión en este equipo</label>
      </div>

      <button class="btn-login" id="btnLogin">
        <span>Ingresar al sistema</span>
      </button>

      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="login-footer">Veexion v8.2 · Acceso cifrado · Datos locales</div>
  </div>

  <script type="module">
    import { login, onAuth, isAdmin } from './firebase-config.js';

    const emailEl  = document.getElementById('email');
    const passEl   = document.getElementById('password');
    const btnLogin = document.getElementById('btnLogin');
    const errorMsg = document.getElementById('errorMsg');

    // Si ya está logueado → redirigir
    onAuth((user) => {
      if (user) {
        window.location.href = isAdmin(user) ? 'admin.html' : 'dashboard.html';
      }
    });

    // Enter en inputs
    [emailEl, passEl].forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
      });
    });

    btnLogin.addEventListener('click', doLogin);

    async function doLogin() {
      const email = emailEl.value.trim();
      const pass  = passEl.value;

      if (!email || !pass) {
        showError('Completá email y contraseña.');
        return;
      }

      btnLogin.classList.add('loading');
      errorMsg.classList.remove('show');

      try {
        // Guardar o limpiar email según checkbox
        if (document.getElementById('rememberMe').checked) {
          localStorage.setItem('ssip_saved_email', email);
        } else {
          localStorage.removeItem('ssip_saved_email');
        }
        await login(email, pass);
        // onAuth redirige automáticamente
      } catch (err) {
        btnLogin.classList.remove('loading');
        const msgs = {
          'auth/user-not-found':  'No existe una cuenta con ese email.',
          'auth/wrong-password':  'Contraseña incorrecta.',
          'auth/invalid-email':   'El email no es válido.',
          'auth/too-many-requests': 'Demasiados intentos. Esperá unos minutos.',
        };
        showError(msgs[err.code] || `Error: ${err.message}`);
      }
    }

    // ── Ojo mostrar/ocultar contraseña ─────────────
    document.getElementById('togglePass').addEventListener('click', () => {
      const input  = document.getElementById('password');
      const icon   = document.getElementById('eyeIcon');
      const show   = input.type === 'password';
      input.type   = show ? 'text' : 'password';
      document.getElementById('togglePass').style.color = show ? 'var(--accent)' : 'var(--muted)';
      icon.innerHTML = show
        ? `<path d="M3 3l14 14M7.5 7.5A3.5 3.5 0 0112.5 12.5M1 10s3-6 9-6c1.5 0 3 .4 4.2 1M19 10s-3 6-9 6c-1.5 0-3-.4-4.2-1"/>`
        : `<path d="M1 10s3-6 9-6 9 6 9 6-3 6-9 6-9-6-9-6z"/><circle cx="10" cy="10" r="2.5"/>`;
    });

    // ── Recordar sesión ──────────────────────────────
    // Cargar email guardado si existe
    const savedEmail = localStorage.getItem('ssip_saved_email');
    if (savedEmail) {
      emailEl.value = savedEmail;
      document.getElementById('rememberMe').checked = true;
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }
  </script>
</body>
</html>
